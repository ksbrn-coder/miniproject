<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/mainstyle.css">
    <title>회원가입</title>
</head>
<body>
<div class="hero-container">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="register-card">
            <h2 class="register-title">회원가입</h2>
            <form action="/join" method="POST" class="register-form">
                <div class="input-group">
                    <label for="uid">아이디</label>
                    <input type="text" id="uid" name="uid" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label for="username">이름</label>
                    <input type="text" id="username" name="username" placeholder="이름을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="confirm_password">비밀번호 확인</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="비밀번호를 한 번 더 입력하세요"
                           required>
                </div>
                <button type="submit" class="hero-btn register-submit">가입하기</button>
            </form>
            <p class="login-link">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
        </div>
    </div>
</div>
<script>
    document.querySelector('.register-form').addEventListener('submit', function(e) {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        // 1. 비밀번호 일치 확인
        if (password !== confirmPassword) {
            e.preventDefault(); // 폼 제출 중단
            alert("비밀번호가 일치하지 않습니다. 다시 확인해주세요.");
            document.getElementById('confirm_password').focus();
            return; // 여기서 함수 종료
        }

        // 2. 일치할 경우 환영 메시지 출력
        // 이 메시지는 '가입하기' 버튼을 눌렀을 때, 데이터가 서버로 전송되기 직전에 뜹니다.
        alert("회원가입을 축하합니다! " + username + "님, 환영합니다!");
    });
</script>
</body>
</html>
