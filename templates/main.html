<!DOCTYPE html>
<html lang="ko">
<head>
    <title>메인 화면</title>
    <!--    -->
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/mainstyle.css">
    <meta charset="UTF-8">
    <div class="hero-container">
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <div class="button-group">
                <a href="/login" class="hero-btn btn-login">로그인</a>
                <a href="/join" class="hero-btn btn-register">회원가입</a>
                <a href="/analysis" class="hero-btn btn-analysis">분석 게시판</a>
            </div>
            <h1 class="welcome-title"> {{ session['user_name'] }} 님,
                환영합니다!</h1>

            <div class="main-container">
                <div class="history-section">
                    <div class="history-slider">
                        <div class="slider-wrapper" id="sliderWrapper">
                            <div class="slide-item">최근 기록 1: 장애물 감지</div>
                            <div class="slide-item">최근 기록 2: 차량 번호 인식</div>
                            <div class="slide-item">최근 기록 3: 보행자 주의</div>
                            <div class="slide-item">최근 기록 4: 신호등 상태 확인</div>
                        </div>
                    </div>
                    <div class="indicator-container">
                        <div class="dot active" onclick="goToSlide(0)"></div>
                        <div class="dot" onclick="goToSlide(1)"></div>
                        <div class="dot" onclick="goToSlide(2)"></div>
                        <div class="dot" onclick="goToSlide(3)"></div>
                    </div>
                </div>

                <div class="result-card">
                    <h2 class="result-header">실시간 이미지 분석 결과</h2>
                    <div class="result-body">
                        <img src="{{ user_image_path }}" alt="분석 이미지" class="analysis-img">
                        <div class="result-text">
                            <p class="data-label">분석 대상: <span class="data-value">도로 위 장애물</span></p>
                            <p class="data-label">정확도: <span class="data-value">98.2%</span></p>
                            <p class="data-status">상태: <span class="status-tag">분석 완료</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</head>
<body>
<script>
    const wrapper = document.getElementById('sliderWrapper');
    const dots = document.querySelectorAll('.dot');
    let currentIndex = 0;

    function nextSlide() {
    currentIndex = (currentIndex + 1) % 4; // 0, 1, 2, 3 반복

    // 위로 이동
    wrapper.style.transform = `translateY(-${currentIndex * 400}px)`;

    // 아이콘 상태 변경
    dots.forEach((dot, index) => {
    dot.classList.toggle('active', index === currentIndex);
    });
    }

    setInterval(nextSlide, 10000);
</script>
</body>
