<!DOCTYPE html>
<html lang="ko">
<head>
    <title></title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/mainstyle.css">
</head>
<body>
<div class="hero-container">
    <div class="hero-overlay"></div>
    <div class="hero-content">

        <div class="register-card">
            <h2 class="register-title"><a href="/" style="text-decoration: none; color: inherit;">정보 수정</a></h2>
            <form action="/member/update" method="POST">
                <div class="input-group">
                    <label>기존 아이디</label>
                    <input type="text" name="uid" value="{{ user.uid }}" readonly>
                </div>
                <div class="input-group">
                    <label>새 아이디</label>
                    <input type="text" name="uid" placeholder="변경할 아이디">
                </div>
                <div class="input-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="pw" placeholder="변경할 비밀번호">
                </div>
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" name="email" value="{{ user.email }}">
                </div>
                <button type="submit" class="hero-btn register-submit">수정 완료</button>
            </form>
        </div>

        <div class="delete-container">
            <p>계정을 삭제하시겠습니까?</p>
            <a href="{{ url_for('delete_member', member_id=session.get('user_id')) }}"
               class="btn-delete"
               onclick="return confirm('정말 탈퇴하시겠습니까?');">
                회원 탈퇴
            </a>
        </div>

    </div>
</div>
</body>
</html>
